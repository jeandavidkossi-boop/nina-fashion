<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Vendeur — Nina Fashion</title>
    <style>
        /* Couleurs & Graphisme */
        :root {
            --primary: #8e24aa; 
            --primary-light: #f3e5f5;
            --accent: #ffb300; 
            --dark: #263238;
            --bg-gray: #f4f6f8;
            --border: #e0e0e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body { display: flex; flex-direction: column; height: 100vh; background-color: var(--bg-gray); overflow: hidden; }

        /* En-tête */
        header { 
            background: var(--primary); color: white; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10;
        }
        header h1 { font-size: 18px; }
        .badge-role { background: var(--accent); color: var(--dark); padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 12px; }

        /* Disposition principale */
        .main-layout { display: flex; flex: 1; overflow: hidden; }

        /* 1. Menu latéral des catégories */
        .sidebar {
            width: 220px; background: white; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; overflow-y: auto;
        }
        .cat-btn {
            padding: 15px 20px; text-align: left; background: none; border: none;
            border-bottom: 1px solid var(--border); cursor: pointer; font-size: 14px;
            font-weight: 500; color: var(--dark); transition: 0.2s;
        }
        .cat-btn:hover { background: var(--primary-light); }
        .cat-btn.active { background: var(--primary-light); color: var(--primary); border-left: 4px solid var(--primary); font-weight: bold; }

        /* 2. Zone des articles */
        .products-area {
            flex: 1; padding: 20px; overflow-y: auto; background: var(--bg-gray);
        }
        .section-title { font-size: 18px; color: var(--primary); margin-bottom: 15px; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        
        .card {
            background: white; border: 1px solid var(--border); border-radius: 8px;
            padding: 15px; text-align: center; cursor: pointer; transition: transform 0.1s;
            display: flex; flex-direction: column; justify-content: space-between; min-height: 100px;
        }
        .card:hover { border-color: var(--primary); box-shadow: 0 4px 8px rgba(0,0,0,0.05); transform: translateY(-2px); }
        .card .name { font-size: 13px; font-weight: 500; margin-bottom: 10px; }
        .card .price { font-size: 13px; font-weight: bold; color: var(--primary); }

        /* 3. Ticket en cours (Panier Vendeur) */
        .ticket-panel {
            width: 320px; background: white; border-left: 1px solid var(--border);
            display: flex; flex-direction: column;
        }
        .ticket-header { padding: 15px; border-bottom: 1px dashed var(--border); background: #fafafa; font-weight: bold; text-align: center;}
        .ticket-items { flex: 1; overflow-y: auto; padding: 10px; }
        
        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 13px; }
        .item-info { flex: 1; }
        .item-name { font-weight: 600; }
        .item-calc { color: #777; font-size: 11px; }
        .item-total { font-weight: bold; margin-left: 10px; }

        .ticket-footer { padding: 20px; background: #fafafa; border-top: 1px solid var(--border); }
        .total-box { display: flex; justify-content: space-between; font-size: 16px; font-weight: bold; margin-bottom: 15px; }
        
        .btn-send {
            width: 100%; background: var(--primary); color: white; border: none; padding: 15px;
            border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer;
        }
        .btn-send:hover { background: #7b1fa2; }
        .btn-send:disabled { background: #ccc; cursor: not-allowed; }

        /* Responsive Mobile */
        @media (max-width: 850px) {
            .main-layout { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); flex-direction: row; overflow-x: auto; white-space: nowrap; }
            .cat-btn { border-bottom: none; border-right: 1px solid var(--border); padding: 10px 15px; }
            .cat-btn.active { border-left: none; border-bottom: 3px solid var(--primary); }
            .ticket-panel { width: 100%; height: 250px; border-left: none; border-top: 2px solid var(--primary); }
        }
    </style>
</head>
<body>

    <header>
        <h1>Nina Fashion</h1>
        <div class="badge-role">👤 ESPACE VENDEUR</div>
    </header>

    <div class="main-layout">
        
        <!-- MENU DES CATÉGORIES -->
        <div class="sidebar" id="category-menu">
            <!-- Rempli par JavaScript -->
        </div>

        <!-- ZONE DES ARTICLES -->
        <div class="products-area">
            <div class="section-title" id="current-category-title">Sélectionnez une catégorie</div>
            <div class="grid" id="products-grid">
                <!-- Rempli par JavaScript -->
            </div>
        </div>

        <!-- TICKET DU VENDEUR -->
        <div class="ticket-panel">
            <div class="ticket-header">🛒 Commande en cours</div>
            <div class="ticket-items" id="ticket-items">
                <div style="text-align:center; color:#999; margin-top:20px; font-size:12px;">Ajoutez des articles...</div>
            </div>
            <div class="ticket-footer">
                <div class="total-box">
                    <span>Total Provisoire:</span>
                    <span id="ticket-total">0 F</span>
                </div>
                <!-- Le bouton n'encaisse pas, il "envoie" -->
                <button class="btn-send" id="btn-send" disabled onclick="envoyerALaCaisse()">Envoyer à la caisse ➡</button>
            </div>
        </div>

    </div>

    <script>
        // --- DONNÉES TEMPORAIRES (Avant connexion à Supabase) ---
        // Ici, j'ai organisé un échantillon de vos vrais articles avec leurs catégories exactes
        const catalogueBDD = [
            { id: 'S1', nom: 'Pagne en bande (au mètre)', prix: 50, categorie: 'Services Surfilage' },
            { id: 'S2', nom: 'Surfilage Pantalon', prix: 100, categorie: 'Services Surfilage' },
            { id: 'S3', nom: 'Robe avec petit volant', prix: 100, categorie: 'Services Surfilage' },
            { id: 'S4', nom: 'Robe avec gros volant', prix: 200, categorie: 'Services Surfilage' },
            
            { id: 'S8', nom: 'Boutons simples n°16 à n°24', prix: 25, categorie: 'Fabrication Boutons' },
            { id: 'S9', nom: 'Boutons simples n°28', prix: 50, categorie: 'Fabrication Boutons' },
            { id: 'S11', nom: 'Boutons dorés n°16 à n°28', prix: 100, categorie: 'Fabrication Boutons' },
            
            { id: 'S13', nom: 'Pression caoutchouc', prix: 50, categorie: 'Pressions & Œillets' },
            { id: 'S14', nom: 'Pression fer', prix: 100, categorie: 'Pressions & Œillets' },
            { id: 'S17', nom: 'Œillet gros', prix: 100, categorie: 'Pressions & Œillets' },

            { id: '276', nom: 'Bouba petit', prix: 100, categorie: 'Fournitures VIP' },
            { id: '279', nom: 'Cou de broderie VIP', prix: 8000, categorie: 'Fournitures VIP' }
        ];

        // --- LOGIQUE DE L'APPLICATION ---
        let panier = [];
        let categorieActuelle = 'Services Surfilage';

        // 1. Extraire la liste des catégories uniques
        const categories = [...new Set(catalogueBDD.map(art => art.categorie))];

        // 2. Afficher le menu de gauche
        function initMenu() {
            const menu = document.getElementById('category-menu');
            menu.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `cat-btn ${cat === categorieActuelle ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = () => changerCategorie(cat);
                menu.appendChild(btn);
            });
            afficherProduits();
        }

        // 3. Changer de catégorie
        function changerCategorie(nouvelleCat) {
            categorieActuelle = nouvelleCat;
            initMenu(); // Met à jour le bouton actif
        }

        // 4. Afficher les produits de la catégorie sélectionnée
        function afficherProduits() {
            document.getElementById('current-category-title').innerText = categorieActuelle;
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';

            const produitsFiltres = catalogueBDD.filter(p => p.categorie === categorieActuelle);
            
            produitsFiltres.forEach(prod => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => ajouterAuPanier(prod);
                card.innerHTML = `
                    <div class="name">${prod.nom}</div>
                    <div class="price">${prod.prix} F</div>
                `;
                grid.appendChild(card);
            });
        }

        // 5. Gestion du panier
        function ajouterAuPanier(produit) {
            const index = panier.findIndex(p => p.id === produit.id);
            if (index > -1) {
                panier[index].quantite++;
            } else {
                panier.push({ ...produit, quantite: 1 });
            }
            majPanier();
        }

        function majPanier() {
            const box = document.getElementById('ticket-items');
            const affTotal = document.getElementById('ticket-total');
            const btnSend = document.getElementById('btn-send');
            
            box.innerHTML = '';
            let total = 0;

            if (panier.length === 0) {
                box.innerHTML = '<div style="text-align:center; color:#999; margin-top:20px; font-size:12px;">Ajoutez des articles...</div>';
                affTotal.innerText = '0 F';
                btnSend.disabled = true;
                return;
            }

            panier.forEach(item => {
                const totalLigne = item.prix * item.quantite;
                total += totalLigne;
                
                box.innerHTML += `
                    <div class="item">
                        <div class="item-info">
                            <div class="item-name">${item.nom}</div>
                            <div class="item-calc">${item.quantite}x ${item.prix} F</div>
                        </div>
                        <div class="item-total">${totalLigne} F</div>
                    </div>
                `;
            });

            affTotal.innerText = `${total.toLocaleString('fr-FR')} F`;
            btnSend.disabled = false;
        }

        // 6. Action finale : Envoyer à la caissière
        function envoyerALaCaisse() {
            // C'est ici que nous mettrons le code SUPABASE plus tard
            // pour injecter les données dans la table 'tickets_attente'
            
            alert("✅ TICKET ENVOYÉ ! \n\nLa caissière vient de recevoir cette commande sur son écran. Le vendeur peut passer au client suivant.");
            panier = [];
            majPanier();
        }

        // Lancement au démarrage
        initMenu();
    </script>
</body>
          </html>
