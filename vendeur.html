<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comptoir Vendeur - Nina Fashion</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1a1c1e; --gold: #b38728; --bg-gray: #f4f6f8; --border: #e2e8f0; --text-dark: #2c3e50; --success: #27ae60; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background-color: var(--bg-gray); color: var(--text-dark); }

            /* EN-TÊTE */
    header { background: var(--primary); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 16px; color: var(--gold); font-family: 'Georgia', serif; }
    .badge-role { background: rgba(255,255,255,0.1); border: 1px solid var(--gold); color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
    .btn-retour { background: transparent; border: none; color: white; cursor: pointer; text-decoration: underline; }

    /* STRUCTURE PRINCIPALE */
    .main-layout { display: flex; flex: 1; overflow: hidden; flex-direction: row; }

    /* CATALOGUE (GAUCHE) */
    .catalog-panel { flex: 1; min-width: 0; display: flex; flex-direction: column; background: #fff; border-right: 1px solid var(--border); }
    .search-box { padding: 10px; border-bottom: 1px solid var(--border); background: #fafafa; }
    .search-input { width: 100%; padding: 12px 15px; border: 2px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; }
    .search-input:focus { border-color: var(--gold); }
    .category-tabs { display: flex; background: #f8f9fa; border-bottom: 1px solid var(--border); overflow-x: auto; white-space: nowrap; }
    .tab-btn { padding: 8px 15px; border: 1px solid var(--border); background: white; border-radius: 20px; cursor: pointer; margin: 10px 5px; font-size: 13px; }
    .tab-btn.active { color: white; background: var(--gold); border-color: var(--gold); }

    .products-grid { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; align-content: start; }
    .product-card { border: 1px solid var(--border); border-radius: 8px; padding: 10px; background: white; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; }
    .product-card:active { transform: scale(0.97); border-color: var(--gold); }
    .product-ref { font-size: 10px; color: white; background: var(--primary); padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }
    .product-name { font-size: 12px; font-weight: 600; color: var(--primary); margin-bottom: 5px; line-height: 1.2; }
    .product-price { font-size: 12px; font-weight: bold; color: var(--gold); }

    /* PANIER (DROITE) */
    .cart-panel { width: 350px; flex-shrink: 0; background: #fff; display: flex; flex-direction: column; box-shadow: -2px 0 10px rgba(0,0,0,0.05); z-index: 10; }
    .cart-header { padding: 12px 15px; background: var(--bg-gray); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-weight: bold; color: var(--primary); }
    .cart-count { background: var(--primary); color: white; font-size: 12px; padding: 2px 8px; border-radius: 10px; }
    .cart-items { flex: 1; overflow-y: auto; padding: 0; background: #fafafa; }

    .cart-item { display: flex; flex-direction: column; padding: 10px 15px; border-bottom: 1px solid #e1e8ed; background: white; }
    .cart-item-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .cart-item-title { font-size: 13px; font-weight: 700; color: var(--primary); }
    .cart-item-subtotal { font-size: 14px; font-weight: bold; color: var(--gold); }
    .cart-item-details { font-size: 11px; color: #7f8c8d; margin-bottom: 5px; }

    .qty-controls { display: flex; align-items: center; justify-content: space-between; background: var(--bg-gray); padding: 5px; border-radius: 6px; }
    .qty-btn { height: 32px; width: 35px; border-radius: 4px; border: 1px solid var(--border); background: white; font-weight: bold; color: var(--primary); cursor: pointer; }
    .half-btn { color: var(--gold); font-size: 13px; font-weight: 800; }
    .qty-input { width: 50px; text-align: center; border: 1px solid var(--border); border-radius: 4px; height: 32px; font-weight: bold; font-size: 14px; color: var(--primary); background: white; }
    .btn-delete { color: #e74c3c; background: transparent; border: none; font-size: 18px; cursor: pointer; padding: 0 5px; }

    .cart-footer { padding: 15px; background: white; border-top: 2px solid var(--border); }
    .total-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; }
    .total-label { font-size: 14px; color: #7f8c8d; font-weight: 600; text-transform: uppercase; }
    .total-amount { font-size: 22px; font-weight: 900; color: var(--primary); }
    .btn-send { width: 100%; background: var(--success); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
    .btn-send:disabled { background: #bdc3c7; cursor: not-allowed; }

    /* FENÊTRES MODALES (Pop-up) */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; }
    .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 12px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    .modal-header { font-size: 16px; font-weight: bold; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
    .modal-group { margin-bottom: 15px; }
    .modal-group label { display: block; font-size: 12px; font-weight: bold; color: #7f8c8d; margin-bottom: 5px; }
    .modal-input { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; }
    .modal-select { width: 100%; padding: 10px; border: 2px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; }
    .quick-btns { display: flex; gap: 5px; margin-top: 5px; }
    .quick-btn { flex: 1; padding: 8px; border: 1px solid var(--gold); background: #fff; color: var(--gold); border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; }
    .quick-btn:active { background: var(--gold); color: #fff; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancel { flex: 1; padding: 12px; border: none; background: #e2e8f0; color: #7f8c8d; border-radius: 6px; font-weight: bold; cursor: pointer; }
    .btn-confirm { flex: 1; padding: 12px; border: none; background: var(--gold); color: white; border-radius: 6px; font-weight: bold; cursor: pointer; }

    @media (max-width: 768px) {
        .main-layout { flex-direction: column; overflow-y: auto; }
        .catalog-panel { flex: none; height: 55vh; }
        .cart-panel { width: 100%; flex: none; height: auto; border-top: 3px solid var(--primary); }
        .products-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 8px; overflow-y: auto; }
                   }
            }
        
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 10px;">
            <button class="btn-retour" onclick="window.location.href='index.html'">🚪 Quitter</button>
            <h1>Nina Fashion</h1>
        </div>
        <div class="badge-role" id="badge-vendeur">🕵️ Vendeur Inconnu</div>
    </header>

    <div class="main-layout">
        <!-- ZONE CATALOGUE -->
        <div class="catalog-panel">
            <div class="search-box">
                <input type="text" id="search-input" class="search-input" placeholder="🔍 Rechercher un article..." oninput="filtrerArticles()">
            </div>
            <div class="category-tabs" id="category-tabs"></div>
            <div class="products-grid" id="products-grid">
                <div style="padding: 20px; text-align: center; color: #7f8c8d; grid-column: 1 / -1;">⏳ Chargement du catalogue...</div>
            </div>
        </div>

        <!-- ZONE PANIER -->
        <div class="cart-panel">
            <div class="cart-header">
                <span>🛒 Panier en cours</span>
                <span class="cart-count" id="cart-count">0 art.</span>
            </div>
            <div class="cart-items" id="cart-items">
                <div id="cart-empty" style="text-align: center; color: #95a5a6; padding: 30px 10px; font-size: 13px;">
                    Le panier est vide.<br>Touchez un article pour l'ajouter.
                </div>
            </div>
            <div class="cart-footer">
                        <div style="margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; padding: 0 15px;">
            <input type="text" id="client-nom" placeholder="👤 Nom du client (Facultatif)" style="padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 12px;">
            <input type="tel" id="client-tel" placeholder="📞 Numéro (Facultatif)" style="padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 12px;">
                        </div>
                <div class="total-row">
                    <span class="total-label">Net à Payer :</span>
                    <span class="total-amount" id="cart-total">0 F</span>
                </div>
                <button class="btn-send" id="btn-envoyer" disabled onclick="envoyerALaCaisse()">✅ VALIDER LA VENTE</button>
            </div>
        </div>
    </div>

    <!-- MODAL 1 : PRIX LIBRE & DÉCOUPE (Pour Tissus, Dentelles...) -->
    <div class="modal" id="modal-decoupe">
        <div class="modal-content">
            <div class="modal-header" id="md-title">Détails de l'article</div>
            <div class="modal-group">
                <label>Vendu par :</label>
                <select id="md-conditionnement" class="modal-select">
                    <option value="Mètre">Mètre</option>
                    <option value="Rouleau">Rouleau</option>
                    <option value="Paquet">Paquet</option>
                    <option value="Pièce">Pièce</option>
                </select>
            </div>
            <div class="modal-group">
                <label>Quantité / Fraction :</label>
                <input type="number" id="md-qte" class="modal-input" step="0.25" value="1">
                <div class="quick-btns">
                    <button class="quick-btn" onclick="document.getElementById('md-qte').value='0.25'">1/4</button>
                    <button class="quick-btn" onclick="document.getElementById('md-qte').value='0.5'">1/2</button>
                    <button class="quick-btn" onclick="document.getElementById('md-qte').value='1'">1</button>
                </div>
            </div>
            <div class="modal-group">
                <label>Prix total payé par le client (FCFA) :</label>
                <input type="number" id="md-prix" class="modal-input" placeholder="Ex: 1500">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="fermerModal('modal-decoupe')">Annuler</button>
                <button class="btn-confirm" onclick="validerDecoupe()">Ajouter</button>
            </div>
        </div>
    </div>

    <!-- MODAL 2 : GESTION DES BOUTONS ET LOTS (3 à 25, 5 à 25, etc.) -->
    <div class="modal" id="modal-lots">
        <div class="modal-content">
            <div class="modal-header" id="ml-title">Vente de Boutons / Accessoires</div>
            <div class="modal-group">
                <label>Règle de vente :</label>
                <select id="ml-regle" class="modal-select" onchange="calculerLot()">
                    <option value="3-25">Lot : 3 pour 25 F</option>
                    <option value="5-25">Lot : 5 pour 25 F</option>
                    <option value="1-25">Unitaire : 25 F / pièce</option>
                    <option value="1-50">Unitaire : 50 F / pièce</option>
                    <option value="1-100">Unitaire : 100 F / pièce</option>
                    <option value="1-300">Unitaire : 300 F / pièce</option>
                </select>
            </div>
            <div class="modal-group" style="background:#f8f9fa; padding:10px; border-radius:6px; border:1px solid #eee;">
                <label style="color:var(--primary);">Le client demande pour (Montant en FCFA) :</label>
                <input type="number" id="ml-montant" class="modal-input" placeholder="Ex: 100" oninput="calculerLot('montant')">
            </div>
            <div style="text-align:center; font-weight:bold; color:#7f8c8d; margin:5px 0;">OU</div>
            <div class="modal-group" style="background:#f8f9fa; padding:10px; border-radius:6px; border:1px solid #eee;">
                <label style="color:var(--primary);">Le client a compté (Nombre de pièces) :</label>
                <input type="number" id="ml-pieces" class="modal-input" placeholder="Ex: 12" oninput="calculerLot('pieces')">
            </div>
            <div id="ml-alerte" style="color:var(--danger); font-size:11px; text-align:center; height:15px; font-weight:bold;"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="fermerModal('modal-lots')">Annuler</button>
                <button class="btn-confirm" onclick="validerLot()">Ajouter</button>
            </div>
        </div>
    </div>
        <script>
        // --- 1. CONFIGURATION SUPABASE ---
        const SUPABASE_URL = "https://tkqosylavymaracevaxt.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrcW9zeWxhdnltYXJhY2V2YXh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTUyMTksImV4cCI6MjA5Nzk3MTIxOX0.hsF2SN7OrxIixwDgRznyYYlEtFzw7MKM2WIO7Aqsb0U";
        const clientSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- 2. SÉCURITÉ : VÉRIFICATION DU BADGE D'ENTRÉE ---
const sessionActive = localStorage.getItem('sessionActive');
const roleActuel = localStorage.getItem('roleUtilisateur');

// Si la personne n'a pas de badge, ou n'est ni Vendeur ni Admin -> Dehors !
if (sessionActive !== 'true' || (roleActuel !== 'Vendeur' && roleActuel !== 'Administrateur')) {
    window.location.replace('index.html'); // Retour forcé à l'accueil
}

// On récupère le nom de l'employé depuis la base de données (si on veut l'afficher plus tard)
// Pour l'instant, on affiche le rôle validé :
document.getElementById('badge-vendeur').innerText = "👤 " + roleActuel;
 let nomVendeur = roleActuel;
            
        // --- 3. LE PANIER INCREVABLE (Mémoire locale) ---
        let CATALOGUE = [];
        let categorieActive = 'Tous';
        // Le panier se recharge depuis la mémoire du téléphone au cas où l'écran s'est éteint
        let panier = JSON.parse(localStorage.getItem('nina_panier_memoire')) || [];
        
        let articleEnCours = null; // Variable temporaire pour les pop-ups

        // --- 4. CHARGEMENT DU CATALOGUE ---
        async function chargerBaseDeDonnees() {
            try {
                // On ne charge que les articles autorisés pour la boutique
                        const { data, error } = await clientSupabase.from('articles_v2')
                    .select('*')
                    .in('cible_utilisation', ['VENTE_PUBLIQUE', 'TOUS'])
                    .order('nom_article', { ascending: true });
                
                if (error) throw error;
                CATALOGUE = data;
                document.getElementById('products-grid').innerHTML = ''; 
                genererOngletsCategories();
                afficherCatalogue();
                mettreAJourPanier(); // On redessine le panier mémorisé
            } catch (err) {
                document.getElementById('products-grid').innerHTML = '<div style="color:red; text-align:center; padding:20px;">❌ Erreur de connexion au catalogue.</div>';
            }
        }

        function genererOngletsCategories() {
            const tabsContainer = document.getElementById('category-tabs');
            let categories = ['Tous', ...new Set(CATALOGUE.map(art => art.categorie || 'Autre'))].sort();
            
            tabsContainer.innerHTML = categories.map(cat => 
                `<button class="tab-btn ${cat === 'Tous' ? 'active' : ''}" onclick="filtrerCategorie('${cat}', this)">${cat}</button>`
            ).join('');
        }

        function filtrerCategorie(cat, btnElement) {
            categorieActive = cat;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            afficherCatalogue();
        }

        function filtrerArticles() { afficherCatalogue(); }

        function afficherCatalogue() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            const recherche = document.getElementById('search-input').value.toLowerCase();

            let articlesFiltres = CATALOGUE.filter(art => {
                let matchCat = (categorieActive === 'Tous' || art.categorie === categorieActive);
                let matchRech = art.nom_article.toLowerCase().includes(recherche) || art.ref.toLowerCase().includes(recherche);
                return matchCat && matchRech;
            });

            if (articlesFiltres.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; color:#7f8c8d;">Aucun article trouvé.</div>';
                return;
            }

            articlesFiltres.forEach(art => {
                const card = document.createElement('div');
                card.className = 'product-card';
                        // Le prix affiché est un texte standard, le vendeur décidera
        let prixAffiche = "Prix à saisir";

        // TOUT clic ouvre la modale de découpe libre
        card.onclick = () => {
            ouvrirModalDecoupe(art); 
        };

card.innerHTML = `
    <span class="product-ref">${art.ref || art.reference || ''}</span>
    <div class="product-name" style="color:#95a5a6">${art.nom_article || art.designation || art.nom || art.NOM || ''}</div>
    <div class="product-price" style="font-size: 12px; color: var(--gold); font-style: italic;">${prixAffiche}</div>
`;
                
                
            });
        }

        // --- 5. GESTION DES FENÊTRES MODALES (POP-UPS) ---
        function fermerModal(id) {
            document.getElementById(id).style.display = 'none';
            articleEnCours = null;
        }

        // A. Modal Découpe (Tissus, Rubans sur mesure...)
        function ouvrirModalDecoupe(art) {
            articleEnCours = art;
            document.getElementById('md-title').innerText = art.nom_article;
            document.getElementById('md-qte').value = "1";
            document.getElementById('md-prix').value = "";
            document.getElementById('modal-decoupe').style.display = 'flex';
        }

        function validerDecoupe() {
            let condi = document.getElementById('md-conditionnement').value;
            let qte = parseFloat(document.getElementById('md-qte').value);
            let prixTotal = parseFloat(document.getElementById('md-prix').value);

            if (isNaN(qte) || qte <= 0 || isNaN(prixTotal) || prixTotal < 0) {
                alert("⚠️ Saisissez une quantité et un prix valides.");
                return;
            }

            // Pour la découpe, le prix unitaire est calculé pour que le total soit juste
            let prixUnitaire = prixTotal / qte;
            let precision = `Vendu par: ${condi} | Découpe: ${qte}`;
            
            insererDansPanier(articleEnCours, qte, prixUnitaire, precision);
            fermerModal('modal-decoupe');
        }

        // B. Modal Lots (Boutons : 3 à 25F, etc.)
        function ouvrirModalLots(art) {
            articleEnCours = art;
            document.getElementById('ml-title').innerText = art.nom_article;
            document.getElementById('ml-montant').value = "";
            document.getElementById('ml-pieces').value = "";
            document.getElementById('ml-alerte').innerText = "";
            document.getElementById('modal-lots').style.display = 'flex';
        }

        function calculerLot(source) {
            let regle = document.getElementById('ml-regle').value.split('-');
            let qteBase = parseInt(regle[0]); // ex: 3
            let prixBase = parseInt(regle[1]); // ex: 25
            
            let champMontant = document.getElementById('ml-montant');
            let champPieces = document.getElementById('ml-pieces');
            let alerte = document.getElementById('ml-alerte');
            alerte.innerText = "";

            if (source === 'montant' && champMontant.value !== "") {
                let m = parseFloat(champMontant.value);
                let p = (m / prixBase) * qteBase;
                champPieces.value = p % 1 === 0 ? p : p.toFixed(1);
                if (m % prixBase !== 0) alerte.innerText = `⚠️ ${m}F ne tombe pas juste avec la règle ${qteBase} à ${prixBase}F.`;
            } 
            else if (source === 'pieces' && champPieces.value !== "") {
                let p = parseFloat(champPieces.value);
                let m = (p / qteBase) * prixBase;
                champMontant.value = m % 1 === 0 ? m : Math.ceil(m);
                if (p % qteBase !== 0) alerte.innerText = `⚠️ La quantité doit idéalement être un multiple de ${qteBase}.`;
            }
        }

        function validerLot() {
            let regle = document.getElementById('ml-regle').options[document.getElementById('ml-regle').selectedIndex].text;
            let pieces = parseFloat(document.getElementById('ml-pieces').value);
            let montantTotal = parseFloat(document.getElementById('ml-montant').value);

            if (isNaN(pieces) || pieces <= 0 || isNaN(montantTotal) || montantTotal <= 0) {
                alert("⚠️ Les champs doivent être remplis correctement.");
                return;
            }

            let prixUnitaire = montantTotal / pieces;
            let precision = `Règle: ${regle}`;
            
            insererDansPanier(articleEnCours, pieces, prixUnitaire, precision);
            fermerModal('modal-lots');
        }

        // --- 6. GESTION DU PANIER ---
        function ajouterAuPanierDirect(art) {
            insererDansPanier(art, 1, parseFloat(art.prix_detail), "Unité standard");
        }

        function insererDansPanier(art, quantite, prixUnitaire, infoSupp) {
            // Création d'un identifiant unique (ref + prix) pour séparer les différents tarifs d'un même article
            let cartId = art.ref + '_' + prixUnitaire.toFixed(2);
            let existant = panier.find(item => item.cartId === cartId);

            if (existant) {
                existant.qte += quantite;
            } else {
                panier.push({
                    cartId: cartId,
                    ref: art.ref,
                    nom: art.nom_article,
                    prixU: prixUnitaire,
                    qte: quantite,
                    details: infoSupp
                });
            }
            mettreAJourPanier();
        }

        function supprimerDuPanier(cartId) {
            panier = panier.filter(item => item.cartId !== cartId);
            mettreAJourPanier();
        }

        function mettreAJourPanier() {
            // SAUVEGARDE SECRÈTE (Le coffre-fort local)
            localStorage.setItem('nina_panier_memoire', JSON.stringify(panier));

            const conteneur = document.getElementById('cart-items');
            if (panier.length === 0) {
                conteneur.innerHTML = '<div id="cart-empty" style="text-align: center; color: #95a5a6; padding: 30px 10px; font-size: 13px;">Le panier est vide.<br>Touchez un article pour l\'ajouter.</div>';
                document.getElementById('cart-total').innerText = "0 F";
                document.getElementById('cart-count').innerText = "0 art.";
                document.getElementById('btn-envoyer').disabled = true;
                return;
            }

            document.getElementById('btn-envoyer').disabled = false;
            let totalGeneral = 0;
            conteneur.innerHTML = '';

            panier.forEach(item => {
                let sousTotal = item.prixU * item.qte;
                totalGeneral += sousTotal;

                conteneur.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-item-header">
                            <span class="cart-item-title">${item.nom}</span>
                            <span class="cart-item-subtotal">${Math.round(sousTotal).toLocaleString('fr-FR')} F</span>
                        </div>
                        <div class="cart-item-details">${item.details}</div>
                        <div class="qty-controls">
                            <div style="font-size:12px; font-weight:bold; padding-left:5px;">Qté: ${item.qte}</div>
                            <button class="btn-delete" onclick="supprimerDuPanier('${item.cartId}')">🗑️</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('cart-total').innerText = Math.round(totalGeneral).toLocaleString('fr-FR') + ' F';
            document.getElementById('cart-count').innerText = panier.length + ' art.';
        }

        // --- 7. ENVOI À LA CAISSE (L'Œil de Moscou actif) ---
        async function envoyerALaCaisse() {
    if (panier.length === 0) return;

    const btn = document.getElementById('btn-envoyer');
    btn.disabled = true;
    btn.innerText = "⏳ Transmission en cours...";

    // On récupère les infos du client (ou vide si non renseigné)
    let nomClient = document.getElementById('client-nom').value.trim();
    let telClient = document.getElementById('client-tel').value.trim();
    
    let total = panier.reduce((sum, item) => sum + (item.prixU * item.qte), 0);
    
    let dateObj = new Date();
    let numTicket = "T-" + dateObj.getHours().toString().padStart(2, '0') + dateObj.getMinutes().toString().padStart(2, '0') + dateObj.getSeconds().toString().padStart(2, '0');

    try {
        // 1. Création du ticket général
        const { data: commandeData, error: commandeError } = await clientSupabase
            .from('commandes')
            .insert([{
                num_panier: numTicket,
                total: Math.round(total),
                statut: 'en_attente',
                vendeur_nom: nomVendeur,
                client_nom: nomClient,
                client_numero: telClient
            }])
            .select();

        if (commandeError) throw commandeError;
        const commandeId = commandeData[0].id;

        // 2. Découpage du panier ligne par ligne
        const lignesAInserer = panier.map(item => ({
            commande_id: commandeId,
            article_ref: item.ref, 
            nom_article: item.nom,
            quantite: item.qte,
            prix_unitaire_vente: item.prixU
        }));

        const { error: lignesError } = await clientSupabase
            .from('lignes_commandes')
            .insert(lignesAInserer);

        if (lignesError) throw lignesError;

        alert(`✅ TICKET VALIDÉ !\nNuméro à donner à la caisse : ${numTicket}\nTotal : ${Math.round(total).toLocaleString('fr-FR')} F`);

        // 3. Remise à zéro
        panier = [];
        localStorage.removeItem('nina_panier_memoire');
        document.getElementById('client-nom').value = ""; // On vide le champ client
        document.getElementById('client-tel').value = ""; // On vide le champ numéro
        mettreAJourPanier();
        btn.innerText = "✅ VALIDER LA VENTE";

    } catch (err) {
        alert("❌ Erreur réseau. Le ticket n'est pas parti à la caisse.");
        console.error("Détail :", err);
        btn.disabled = false;
        btn.innerText = "🔄 RÉESSAYER";
    }
                                }
            
        // DÉMARRAGE
        chargerBaseDeDonnees();
    </script>
