<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil — Nina Fashion Mercerie Générale</title>
    <!-- Chargement du module Supabase pour la future liaison en direct -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Charte Graphique Haut de Gamme inspirée du Logo Or de Nina Fashion */
        :root {
            --gold-gradient: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%);
            --gold-solid: #b38728;
            --dark-royal: #1a1c1e;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --bg-light: #f8f9fa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
        }

        /* Conteneur principal de l'accueil */
        .welcome-container {
            width: 100%;
            max-width: 600px;
            text-align: center;
            margin-top: auto;
            margin-bottom: auto;
        }

        /* Logo textuel stylisé façon Or */
        .brand-header {
            margin-bottom: 40px;
        }

        .brand-logo-emblem {
            font-size: 64px;
            font-weight: bold;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            line-height: 1;
            margin-bottom: 5px;
            font-family: 'Georgia', serif;
        }

        .brand-title {
            font-size: 28px;
            font-weight: 600;
            color: var(--dark-royal);
            letter-spacing: 0.5px;
        }

        .brand-subtitle {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #7f8c8d;
            margin-top: 5px;
            font-weight: bold;
        }

        .location-badge {
            display: inline-block;
            background: #e9ecef;
            padding: 4px 15px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            color: var(--gold-solid);
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* Grille des boutons de rôles */
        .roles-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 30px;
            width: 100%;
        }

        @media (min-width: 480px) {
            .roles-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            /* L'administrateur prend toute la largeur sur tablette/ordinateur */
            .role-card.admin-card {
                grid-column: span 2;
            }
        }

        /* Design des cartes boutons */
        .role-card {
            background: var(--card-bg);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .role-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px rgba(179, 135, 40, 0.1);
            border-color: var(--gold-solid);
        }

        .role-card.admin-card {
            background: var(--dark-royal);
            color: white;
            border: none;
        }
        
        .role-card.admin-card:hover {
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .role-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .role-name {
            font-size: 15px;
            font-weight: 600;
        }

        /* Le Modal (Fenêtre Popup de Sécurité) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            align-items: center; justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 30px 25px;
            border-radius: 16px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 20px 25px rgba(0,0,0,0.15);
            animation: popIn 0.2s ease-out;
        }

        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            font-size: 18px;
            color: var(--dark-royal);
            margin-bottom: 10px;
            font-weight: bold;
        }

        .modal-desc {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .code-input {
            width: 100%;
            padding: 12px;
            font-size: 20px;
            text-align: center;
            letter-spacing: 6px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 15px;
            outline: none;
        }

        .code-input:focus {
            border-color: var(--gold-solid);
        }

        .btn-submit {
            width: 100%;
            background: var(--dark-royal);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .btn-submit.gold-btn {
            background: var(--gold-solid);
        }

        .btn-cancel {
            background: transparent;
            border: none;
            color: #95a5a6;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-cancel:hover { color: #7f8c8d; }

        footer {
            font-size: 11px;
            color: #bdc3c7;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        
        <!-- EN-TÊTE DE LA MARQUE -->
        <div class="brand-header">
            <div class="brand-logo-emblem">N</div>
            <div class="brand-title">Nina Fashion</div>
            <div class="brand-subtitle">Mercerie Générale</div>
            <div class="location-badge">BOUAFLÉ — MAGASIN CENTRAL</div>
        </div>

        <!-- GRILLE DE SÉLECTION DES POSTES -->
        <div class="roles-grid">
            
            <!-- 1. Administrateur -->
            <div class="role-card admin-card" onclick="ouvrirSecurite('Administrateur', 'admin.html')">
                <div class="role-icon">👑</div>
                <div class="role-name">Administrateur (Gérants)</div>
            </div>

            <!-- 2. Caissière -->
            <div class="role-card" onclick="ouvrirSecurite('Caissière', 'caisse.html')">
                <div class="role-icon">💰</div>
                <div class="role-name">Espace Caissière</div>
            </div>

            <!-- 3. Vendeur -->
            <div class="role-card" onclick="ouvrirSecurite('Vendeur', 'vendeur.html')">
                <div class="role-icon">🛍️</div>
                <div class="role-name">Espace Vendeur</div>
            </div>

            <!-- 4. Machiniste -->
            <div class="role-card" onclick="ouvrirSecurite('Machiniste', 'machiniste.html')">
                <div class="role-icon">🪡</div>
                <div class="role-name">Atelier Machinistes</div>
            </div>

            <!-- 5. Magasinier -->
            <div class="role-card" onclick="ouvrirSecurite('Magasinier', 'stock.html')">
                <div class="role-icon">📦</div>
                <div class="role-name">Gestion des Stocks</div>
            </div>

        </div>

    </div>

    <!-- LE PORTAL DE SÉCURITÉ (MODAL) -->
    <div class="modal" id="login-modal">
        <div class="modal-content">
            <div class="modal-title" id="modal-role-title">Connexion Écran</div>
            <div class="modal-desc">Veuillez entrer votre code d'accès secret pour continuer.</div>
            
            <input type="password" id="input-code" class="code-input" placeholder="••••" maxlength="6" inputmode="numeric">
            
            <button class="btn-submit" id="btn-valider-code" onclick="verifierCodeAccès()">S'authentifier</button>
            <button class="btn-cancel" onclick="fermerSecurite()">Annuler</button>
        </div>
    </div>

    <footer>
        &copy; 2026 Nina Fashion — Système Intelligent de Gestion Réseau
    </footer>

    <!-- LE LOGICIEL DE VÉRIFICATION -->
    <script>
        // --- CONFIGURATION SUPABASE (Pour l'étape suivante) ---
        // Dès qu'on connectera la BDD, on mettra vos vraies clés ici :
        const SUPABASE_URL = "https://tkqosylavymaracevaxt.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrcW9zeWxhdnltYXJhY2V2YXh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTUyMTksImV4cCI6MjA5Nzk3MTIxOX0.hsF2SN7OrxIixwDgRznyYYlEtFzw7MKM2WIO7Aqsb0U";
const clientSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- CODES DE TEST TEMPORAIRES (Pour valider de suite sur GitHub) ---
        // Changez ces 4 chiffres par ce que vous voulez pour tester les accès !
        const CODES_TEST = {
            'Administrateur': '0000', // Code exemple pour Nina et vous
            'Caissière': '1111',      // Code pour la caisse
            'Vendeur': '2222',        // Code pour le vendeur d'articles
            'Machiniste': '3333',     // Code pour les personnes au surfilage/boutons
            'Magasinier': '4444'      // Code pour le dépôt
        };

        let roleSelectionne = '';
        let fichierCible = '';

        // Ouvrir le panneau de sécurité
        function ouvrirSecurite(role, fichier) {
            roleSelectionne = role;
            fichierCible = fichier;
            
            document.getElementById('modal-role-title').innerText = `Accès ${role}`;
            document.getElementById('input-code').value = ''; // On vide l'ancien texte
            document.getElementById('login-modal').style.display = 'flex';
            document.getElementById('input-code').focus();
        }

        // Fermer le panneau de sécurité
        function fermerSecurite() {
            document.getElementById('login-modal').style.display = 'none';
        }

                // Procédure de vérification et Pointage des employés
        async function verifierCodeAcces() {
            const codeSaisi = document.getElementById('input-code').value.trim();
            
            if (!codeSaisi) {
                alert("⚠️ Veuillez entrer un code secret.");
                return;
            }

            // On affiche un petit message d'attente sur le bouton
            const btnSubmit = document.getElementById('btn-valider-code');
            btnSubmit.innerText = "Vérification...";
            btnSubmit.disabled = true;

            try {
                // 1. VÉRIFICATION SÉCURISÉE DIRECTEMENT DANS LE COFFRE SUPABASE
                let { data: employe, error } = await clientSupabase
                    .from('personnel_nina')
                    .select('*')
                    .eq('role', roleSelectionne)
                    .eq('code_pin', codeSaisi)
                    .eq('actif', true) // <-- Vérifie si tu n'as pas bloqué cet employé
                    .maybeSingle();

                if (error) throw error;

                if (employe) {
                    // 2. LE POINTAGE (Enregistrement de l'heure exacte d'arrivée)
                    await clientSupabase.from('logs_connexion').insert([{
                        nom_employe: employe.nom_employe,
                        role: employe.role
                    }]);

                    // 3. SUCCÈS : Ouverture de la porte vers le fichier de travail
                    window.location.href = fichierCible;
                } else {
                    // ÉCHEC : Mauvais code ou employé bloqué
                    alert("❌ Code d'accès incorrect ou compte désactivé par l'Administrateur.");
                    document.getElementById('input-code').value = '';
                    btnSubmit.innerText = "S'authentifier";
                    btnSubmit.disabled = false;
                    document.getElementById('input-code').focus();
                }
            } catch (err) {
                alert("❌ Erreur de réseau. Impossible de contacter la base de données.");
                btnSubmit.innerText = "S'authentifier";
                btnSubmit.disabled = false;
            }
        }

        // Permettre de valider en appuyant sur la touche "Entrée" du téléphone
        document.getElementById('input-code').addEventListener('keypress', function (e) {
            if (e.key === 'Entrée' || e.keyCode === 13) {
                verifierCodeAccès();
            }
        });
    </script>
</body>
</html>
