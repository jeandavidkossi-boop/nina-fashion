<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Sécurisé - Nina Fashion</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* DESIGN INSTITUTIONNEL ET LUXE */
        :root {
            --primary: #111418;
            --gold: #b38728;
            --bg-light: #f8f9fa;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--bg-light);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: white;
            padding: 50px 40px;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
            text-align: center;
            width: 90%;
            max-width: 380px;
            border-top: 3px solid var(--gold);
        }

        .logo-officiel {
            width: 140px;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(179, 135, 40, 0.2);
            margin-bottom: 25px;
        }

        .titre-institution {
            font-family: 'Georgia', serif;
            color: var(--primary);
            font-size: 1.3rem;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .sous-titre {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 35px;
        }

        .input-group {
            margin-bottom: 30px;
        }

        /* Champ de saisie minimaliste façon Banque */
        .code-input {
            width: 70%;
            padding: 10px 5px;
            border: none;
            border-bottom: 2px solid #e0e0e0;
            font-size: 1.6rem;
            text-align: center;
            letter-spacing: 12px;
            color: var(--primary);
            background: transparent;
            outline: none;
            transition: all 0.3s;
            border-radius: 0;
        }

        .code-input:focus {
            border-bottom: 2px solid var(--gold);
        }

        /* Bouton statutaire */
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn-submit:active {
            background: #000;
        }

        #message-erreur {
            color: #c0392b;
            font-size: 0.8rem;
            margin-top: 20px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="logo.jpg" alt="Logo Nina Fashion" class="logo-officiel">
        
        <div class="titre-institution">PORTAIL D'ACCÈS</div>
        <div class="sous-titre">Réseau Magasins</div>
        
        <div class="input-group">
            <input type="password" id="input-code" class="code-input" placeholder="••••" maxlength="4" inputmode="numeric" autocomplete="off">
        </div>
        
        <button class="btn-submit" id="btn-valider" onclick="verifierCodeAcces()">S'authentifier</button>
        <div id="message-erreur">❌ Accès refusé. Veuillez vérifier vos habilitations.</div>
    </div>

    <script>
        // --- 1. CONFIGURATION SUPABASE ---
        const SUPABASE_URL = "https://tkqosylavymaracevaxt.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrcW9zeWxhdnltYXJhY2V2YXh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTUyMTksImV4cCI6MjA5Nzk3MTIxOX0.hsF2SN7OrxIixwDgRznyYYlEtFzw7MKM2WIO7Aqsb0U";
        const clientSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- 2. LE MOTEUR DE REDIRECTION INTELLIGENT ---
        async function verifierCodeAcces() {
            const codeSaisi = document.getElementById('input-code').value.trim();
            const btnSubmit = document.getElementById('btn-valider');
            const msgErreur = document.getElementById('message-erreur');

            if (codeSaisi.length < 4) return;

            msgErreur.style.display = 'none';
            btnSubmit.innerText = "AUTHENTIFICATION...";
            btnSubmit.disabled = true;

            try {
                const { data: employe, error } = await clientSupabase
                    .from('personnel_nina')
                    .select('*')
                    .eq('code_pin', codeSaisi)
                    .eq('actif', true)
                    .maybeSingle();

                if (error) throw error;

                if (employe) {
                    localStorage.setItem('sessionActive', 'true');
                    localStorage.setItem('roleUtilisateur', employe.role);
                    localStorage.setItem('nomEmploye', employe.nom_employe);

                    const role = employe.role.toLowerCase();
                    
                    if (role === 'administrateur') {
                        window.location.href = 'admin.html';
                    } else if (role === 'magasinier') {
                        window.location.href = 'stock.html';
                    } else if (role === 'caissière' || role === 'vendeur') {
                        window.location.href = 'caisse.html';
                    } else if (role === 'machiniste') {
                        window.location.href = 'machiniste.html';
                    } else {
                        throw new Error("Rôle non configuré");
                    }
                } else {
                    throw new Error("Accès refusé");
                }

            } catch (err) {
                msgErreur.style.display = 'block';
                btnSubmit.innerText = "S'AUTHENTIFIER";
                btnSubmit.disabled = false;
                document.getElementById('input-code').value = '';
                document.getElementById('input-code').focus();
            }
        }

        document.getElementById('input-code').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                verifierCodeAcces();
            }
        });
    </script>
</body>
</html>
