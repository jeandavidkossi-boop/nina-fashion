<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock & Logistique - Mercerie Générale Nina Fashion</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        <style>
        :root {
            --primary: #1a1c1e; 
            --gold: #b38728; 
            --bg-gray: #f4f6f8;
            --border: #e2e8f0; 
            --text-dark: #2c3e50; 
            --success: #27ae60; 
            --danger: #e74c3c; 
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: var(--bg-gray); color: var(--text-dark); margin: 0; padding: 20px; }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: var(--gold); font-size: 24px; }

        /* Tes vrais onglets clairs et coulissants */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; border-bottom: 2px solid var(--border); }
        .tab-btn { flex: 1; padding: 15px 20px; background-color: transparent; color: #95a5a6; border: none; cursor: pointer; font-weight: bold; transition: all 0.3s ease; }
        .tab-btn.active { color: var(--gold); border-bottom: 3px solid var(--gold); background-color: #fffcf5; }

        .container { display: none; background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        .container.active { display: block; animation: fadeIn 0.3s ease-in-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Garde le reste de tes styles de tableaux et boutons intacts ici */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--gold); font-weight: bold; background-color: white; }
        
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 5px; box-sizing: border-box; }
        
        .btn-action { background-color: var(--gold); color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; width: 100%; }
        .btn-action:hover { background-color: #f39c12; }
        .btn-danger { background-color: var(--danger); width: auto; padding: 5px 10px; }
        
        .form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; align-items: start; }
    </style>
</head>
<body>

    <div class="header">
        <h1>📦 LOGISTIQUE & DÉPÔT - NINA FASHION</h1>
        <span style="color: #95a5a6;">Connecté en tant que : Magasinier</span>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('vision')">👁️ VISION GLOBALE</button>
        <button class="tab-btn" onclick="switchTab('entree')">📥 MOUVEMENTS (COLIS)</button>
        <button class="tab-btn" onclick="switchTab('commandes')">⚠️ ALERTES & COMMANDES</button>
    </div>

    <div id="tab-vision" class="container active">
        <h2 style="color: var(--gold);">État du Stock Physique</h2>
        <input type="text" id="search-stock" placeholder="🔍 Rechercher un article ou une référence..." onkeyup="filtrerStock()">
        <table>
            <thead>
                <tr>
                    <th>Réf.</th>
                    <th>Article</th>
                    <th>Couleur/Variante</th>
                    <th>Quantité en Dépôt</th>
                    <th>Seuil Alerte</th>
                </tr>
            </thead>
            <tbody id="table-stock-body">
                <tr><td colspan="5" style="text-align: center;">⏳ Chargement du stock...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="tab-entree" class="container">
        <h2 style="color: var(--gold);">Enregistrer un Arrivage</h2>
        <div class="form-grid">
            <div>
                <label>Article du Catalogue</label>
                <select id="mvt-article"><option>Chargement...</option></select>
            </div>
            <div>
                <label>Couleur / Motif</label>
                <input type="text" id="mvt-couleur" placeholder="Ex: Bleu Nuit">
            </div>
            <div>
                <label>Quantité reçue</label>
                <input type="number" id="mvt-qte" placeholder="0" min="1">
            </div>
            <div style="padding-top: 22px;">
                <button class="btn-action" onclick="ajouterAuBordereau()">➕ AJOUTER</button>
            </div>
        </div>

        <h3 style="margin-top: 30px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">📋 Bordereau en cours</h3>
        <table>
            <thead>
                <tr>
                    <th>Article</th>
                    <th>Couleur</th>
                    <th>Quantité</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="table-bordereau"></tbody>
        </table>
        <br>
        <button id="btn-valider" class="btn-action" style="background-color: var(--success); color: white;" onclick="validerBordereau(this)">💾 VALIDER LE BORDEREAU</button>
    </div>

    <div id="tab-commandes" class="container">
        <h2 style="color: var(--gold);">Articles en Rupture / Alerte</h2>
        <div id="liste-alertes"></div>
        <br>
        <button class="btn-action" style="background-color: #25D366; color: white;" onclick="envoyerWhatsApp()">📲 ENVOYER LA COMMANDE AU FOURNISSEUR</button>
    </div>
        <script>
        // --- 1. CONNEXION SUPABASE ---
        const SUPABASE_URL = "https://tkqosylavymaracevaxt.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrcW9zeWxhdnltYXJhY2V2YXh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTUyMTksImV4cCI6MjA5Nzk3MTIxOX0.hsF2SN7OrxIixwDgRznyYYlEtFzw7MKM2WIO7Aqsb0U";
        const clientSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
        // --- 2. VARIABLES GLOBALES BÉTONNÉES ---
        let CATALOGUE = [];
        let STOCK_DEPOT = [];
        let bordereau = [];

        // Sécurité anti-crash pour le cache mémoire
        try {
            bordereau = JSON.parse(localStorage.getItem('nina_depot_bordereau')) || [];
        } catch(e) {
            localStorage.removeItem('nina_depot_bordereau');
            bordereau = [];
        }

        // --- 3. DÉMARRAGE ET CHARGEMENT ---
        window.onload = () => {
            chargerDonneesDepot();
            afficherBordereau();
        };

                function switchTab(tabId) {
            // On cache tout et on désactive les boutons
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

            // On affiche le bon conteneur
            document.getElementById('tab-' + tabId).classList.add('active');

            // On active le bon bouton (avec la ligne dorée)
            let btnActif = document.querySelector(`button[onclick="switchTab('${tabId}')"]`);
            if (btnActif) btnActif.classList.add('active');

            // Rafraîchissement des données selon l'onglet
            if (tabId === 'vision') chargerDonneesDepot();
            if (tabId === 'entree') remplirSelectArticles();
                }
            
        async function chargerDonneesDepot() {
            try {
                // On charge le catalogue
                const { data: catData, error: catErr } = await clientSupabase.from('articles_v2').select('*').order('nom_article');
                if (catErr) throw catErr;
                CATALOGUE = catData || [];

                // On charge le stock physique existant
                const { data: stockData, error: stockErr } = await clientSupabase.from('stock_depot').select('*');
                if (stockErr) throw stockErr;
                STOCK_DEPOT = stockData || [];

                afficherVisionGlobale();
                remplirSelectArticles();
                construireAlertesCommande();
            } catch (error) {
                console.error("Erreur de chargement :", error);
                document.getElementById('table-stock-body').innerHTML = `<tr><td colspan="5" style="color: var(--danger); text-align: center;">❌ Erreur de connexion à la base de données.</td></tr>`;
            }
        }

        // --- 4. AFFICHAGE VISION GLOBALE ---
        function afficherVisionGlobale() {
            const tbody = document.getElementById('table-stock-body');
            tbody.innerHTML = '';

            if (STOCK_DEPOT.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #7f8c8d;">Aucun article physiquement en stock. Faites une entrée !</td></tr>`;
                return;
            }

            STOCK_DEPOT.forEach(ligneStock => {
                // On retrouve le nom et la ref grâce au Catalogue
                const articleInfo = CATALOGUE.find(a => a.id === ligneStock.article_id) || {};
                
                const qte = parseFloat(ligneStock.quantite);
                const seuil = parseFloat(ligneStock.seuil_alerte);
                let couleurQte = (qte <= seuil) ? "color: var(--danger); font-weight: bold;" : "color: var(--success); font-weight: bold;";

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${articleInfo.ref || 'Inconnue'}</td>
                    <td style="font-weight: bold;">${articleInfo.nom_article || 'Article supprimé'}</td>
                    <td>${ligneStock.couleur_ref || 'Standard'}</td>
                    <td style="${couleurQte}">${qte}</td>
                    <td>${seuil}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filtrerStock() {
            const recherche = document.getElementById('search-stock').value.toLowerCase();
            const lignes = document.querySelectorAll('#table-stock-body tr');
            
            lignes.forEach(ligne => {
                const texte = ligne.innerText.toLowerCase();
                ligne.style.display = texte.includes(recherche) ? '' : 'none';
            });
        }

        function remplirSelectArticles() {
            const select = document.getElementById('mvt-article');
            select.innerHTML = '<option value="">-- Sélectionnez un article --</option>';
            CATALOGUE.forEach(art => {
                select.innerHTML += `<option value="${art.id}">${art.ref} - ${art.nom_article}</option>`;
            });
        }
                    // --- 5. GESTION DU BORDEREAU (Mémoire locale) ---
        function ajouterAuBordereau() {
            const selectArt = document.getElementById('mvt-article');
            const couleur = document.getElementById('mvt-couleur').value.trim() || 'Standard';
            const qte = parseFloat(document.getElementById('mvt-qte').value);

            if (!selectArt.value || !qte || qte <= 0) {
                return alert("⚠️ Veuillez sélectionner un article et une quantité valide !");
            }

            const nomArticle = selectArt.options[selectArt.selectedIndex].text;

            bordereau.push({
                article_id: selectArt.value,
                nom_affiche: nomArticle,
                couleur: couleur,
                qte: qte
            });

            localStorage.setItem('nina_depot_bordereau', JSON.stringify(bordereau));
            
            // On vide les cases pour le prochain article
            document.getElementById('mvt-couleur').value = '';
            document.getElementById('mvt-qte').value = '';
            
            afficherBordereau();
        }

        function afficherBordereau() {
            const tbody = document.getElementById('table-bordereau');
            tbody.innerHTML = '';

            if (bordereau.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #7f8c8d;">Le bordereau est vide.</td></tr>`;
                return;
            }

            bordereau.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.nom_affiche}</td>
                    <td>${item.couleur}</td>
                    <td style="font-weight: bold; color: var(--gold);">${item.qte}</td>
                    <td><button class="btn-action btn-danger" onclick="supprimerDuBordereau(${index})">X</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function supprimerDuBordereau(index) {
            bordereau.splice(index, 1);
            localStorage.setItem('nina_depot_bordereau', JSON.stringify(bordereau));
            afficherBordereau();
        }

        // --- 6. VALIDATION ET ENVOI À SUPABASE (Le moteur blindé) ---
        async function validerBordereau(btn) {
            if (bordereau.length === 0) return alert("⚠️ Le bordereau est vide !");
            
            btn.disabled = true;
            btn.innerText = "⏳ Enregistrement en cours...";

            try {
                // On traite chaque ligne du bordereau une par une (Méthode la plus sûre)
                for (let item of bordereau) {
                    
                    // 1. On inscrit la trace dans l'historique
                    await clientSupabase.from('mouvements_depot').insert([{
                        article_id: item.article_id,
                        couleur_ref: item.couleur,
                        type_mouvement: 'ENTREE',
                        quantite: item.qte,
                        utilisateur: 'Magasinier'
                    }]);

                    // 2. On vérifie si l'article+couleur existe déjà dans le stock physique
                    const { data: existData } = await clientSupabase.from('stock_depot')
                        .select('id, quantite')
                        .eq('article_id', item.article_id)
                        .eq('couleur_ref', item.couleur);

                    if (existData && existData.length > 0) {
                        // Il existe : on ADITIONNE la quantité
                        let nouvelleQte = parseFloat(existData[0].quantite) + parseFloat(item.qte);
                        await clientSupabase.from('stock_depot')
                            .update({ quantite: nouvelleQte })
                            .eq('id', existData[0].id);
                    } else {
                        // Il n'existe pas : on CRÉE la ligne dans le stock
                        await clientSupabase.from('stock_depot').insert([{
                            article_id: item.article_id,
                            couleur_ref: item.couleur,
                            quantite: item.qte,
                            seuil_alerte: 5
                        }]);
                    }
                }

                alert("✅ Arrivage enregistré avec succès dans la base !");
                bordereau = [];
                localStorage.removeItem('nina_depot_bordereau');
                afficherBordereau();
                chargerDonneesDepot(); // Rafraîchit la vision globale
                
                btn.disabled = false;
                btn.innerText = "💾 VALIDER LE BORDEREAU";

            } catch (err) {
                alert("❌ Erreur réseau. Le bordereau n'a pas été perdu, réessayez.");
                console.error(err);
                btn.disabled = false;
                btn.innerText = "🔄 RÉESSAYER";
            }
        }

        // --- 7. ALERTES ET WHATSAPP ---
        function construireAlertesCommande() {
            const conteneur = document.getElementById('liste-alertes');
            conteneur.innerHTML = '';

            const enAlerte = STOCK_DEPOT.filter(art => parseFloat(art.quantite) <= parseFloat(art.seuil_alerte));

            if (enAlerte.length === 0) {
                conteneur.innerHTML = `<div style="color: var(--success);">✅ Tout va bien, aucun article en rupture.</div>`;
                return;
            }

            enAlerte.forEach(ligneStock => {
                const articleInfo = CATALOGUE.find(a => a.id === ligneStock.article_id) || {};
                conteneur.innerHTML += `
                    <div class="alerte-card">
                        <strong>${articleInfo.nom_article || 'Article inconnu'}</strong> (${ligneStock.couleur_ref || 'Standard'})<br>
                        <span style="color: var(--danger);">Reste : ${ligneStock.quantite}</span> (Seuil : ${ligneStock.seuil_alerte})
                    </div>
                `;
            });
        }

        function envoyerWhatsApp() {
            const enAlerte = STOCK_DEPOT.filter(art => parseFloat(art.quantite) <= parseFloat(art.seuil_alerte));
            if (enAlerte.length === 0) return alert("Rien à commander pour le moment !");

            let texte = "📦 *COMMANDE URGENTE - MERCERIE NINA FASHION* 📦\n\nNous avons besoin d'un réassort pour :\n\n";
            
            enAlerte.forEach((ligneStock, idx) => {
                const articleInfo = CATALOGUE.find(a => a.id === ligneStock.article_id) || {};
                texte += `- ${idx + 1}. *${articleInfo.nom_article || 'Article inconnu'}* (${ligneStock.couleur_ref || 'Standard'}) -> Il ne reste que ${ligneStock.quantite} en stock\n`;
            });

            texte += "\nMerci de nous préparer cela rapidement.";
            
            const numFournisseur = "22500000000"; // Remplace par le vrai numéro
            const url = `https://wa.me/${numFournisseur}?text=${encodeURIComponent(texte)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
