<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion du Dépôt - Mercerie Générale Nina Fashion</title>
    <!-- Chargement de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
      <style>
        /* DESIGN INSTITUTIONNEL - LOGISTIQUE */
        :root {
            --primary: #111418;
            --gold: #b38728;
            --bg-light: #f8f9fa;
            --border: #e5e7eb;
            --text-dark: #333;
            --danger: #c0392b;
            --success: #27ae60;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body { background-color: var(--bg-light); color: var(--primary); min-height: 100vh; }

        header {
            background: white; border-bottom: 1px solid var(--border); padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        header h1 { font-family: 'Georgia', serif; font-size: 1.2rem; margin: 0; letter-spacing: 1px; }
        .btn-retour { background: transparent; border: none; font-size: 0.75rem; color: #888; cursor: pointer; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        #badge-magasinier { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); font-weight: bold; }

        .tabs-container { background: white; border-bottom: 1px solid var(--border); padding: 0 20px; }
        .tabs { display: flex; gap: 25px; overflow-x: auto; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background: transparent; border: none; padding: 15px 0; font-size: 0.8rem; color: #888; text-transform: uppercase; font-weight: bold; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: 0.3s; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--gold); }

        .container { padding: 20px; display: none; max-width: 800px; margin: 0 auto; width: 100%; animation: fadeIn 0.3s ease-in-out; }
        .container.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .form-card { background: white; border-radius: 4px; padding: 25px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .form-card h2, .form-card h3 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.75rem; font-weight: bold; color: #888; text-transform: uppercase; }
        
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 0.9rem; background: #fafafa; outline: none; }
        input:focus, select:focus { border-color: var(--gold); background: white; }

        .btn-block { width: 100%; padding: 14px; border: none; border-radius: 4px; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s; }
        .btn-gold { background: var(--primary); color: white; }
        .btn-gold:active { background: #000; }
        .btn-success { background: var(--gold); color: white; margin-top: 10px; }
        .btn-danger { background: var(--danger); color: white; width: auto; padding: 8px 15px; font-size: 0.7rem; border-radius: 4px; }
        .btn-block:disabled { background: #e0e0e0; cursor: not-allowed; color: #888; }

        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); color: #888; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 12px; border-bottom: 1px solid var(--bg-light); font-size: 0.85rem; color: var(--primary); }

        .alerte-card { background: white; border: 1px solid var(--border); border-left: 3px solid var(--danger); padding: 15px; margin-bottom: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        
        .cache { display: none !important; }
        .titre-famille { color: var(--primary); padding: 15px 0 5px 0; border-bottom: 2px solid var(--primary); margin-top: 25px; font-family: 'Georgia', serif; font-weight: bold; font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; }
        .titre-article { background: white; color: var(--primary); padding: 14px; margin-top: 8px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; border-radius: 4px; border: 1px solid var(--border); font-size: 0.85rem; }
        .contenu-couleurs { background: white; border: 1px solid var(--border); border-top: none; padding: 10px; border-radius: 0 0 4px 4px; margin-bottom: 15px; }            
      </style>
</head>
<body>

    <!-- EN-TÊTE -->
    <header>
       <button class="btn-retour" onclick="localStorage.clear(); window.location.href='index.html'">◄ Quitter</button>
        <h1>Nina Fashion</h1>
        <div id="badge-magasinier">Logistique</div>
    </header>

    <!-- ONGLETS -->
    <div class="tabs-container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('vision')">Vision Globale</button>
            <button class="tab-btn" onclick="switchTab('mouvement')">Mouvements</button>
            <button class="tab-btn" onclick="switchTab('commande')">Alertes & Commandes</button>
        </div>
    </div>
    
    <!-- ONGLET 1 : VISION GLOBALE -->
    <div id="tab-vision" class="container active">
        <input type="text" id="search-stock" placeholder="🔍 Rechercher un article ou une couleur..." onkeyup="filtrerStock()">
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Article</th>
                        <th>Couleur</th>
                        <th>Quantité</th>
                        <th>Seuil</th>
                    </tr>
                </thead>
                <tbody id="table-stock-body">
                    <tr><td colspan="4" style="text-align:center; padding:30px; color:#7f8c8d; font-weight:bold;">⏳ Chargement du stock physique...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ONGLET 2 : MOUVEMENTS (Séparés Entrée / Sortie) -->
    <div id="tab-mouvement" class="container">
        <div class="form-card">
            <h2 style="color: var(--gold); margin-top: 0; margin-bottom: 15px; font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 10px;">Enregistrer un mouvement</h2>
            
            <div class="form-group">
                <label>1. Type de mouvement :</label>
                <select id="mvt-type" onchange="toggleDestination()" style="background-color: #f8f9fa; font-weight: bold;">
                    <option value="ENTREE">📥 ENTRÉE (Arrivage Fournisseur)</option>
                    <option value="SORTIE">📤 SORTIE (Diminution du stock)</option>
                </select>
            </div>

            <div class="form-group" id="group-destination" style="display: none; background: #fffcf5; padding: 10px; border-radius: 6px; border: 1px solid var(--gold);">
                <label style="color: var(--danger);">2. Destination de la marchandise :</label>
                <select id="mvt-destination">
                    <option value="Rayon Boutique">🛍️ Transfert vers Rayons Boutique</option>
                    <option value="Atelier Interne">✂️ Consommation par les Machinistes</option>
                </select>
            </div>

            <div class="form-group">
                <label>Article du Catalogue :</label>
                <select id="mvt-article">
                    <option value="">⏳ Chargement du catalogue...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Couleur / Motif :</label>
                <input type="text" id="mvt-couleur" placeholder="Ex: Blanc, Bleu Nuit, Doré...">
            </div>

            <div class="form-group">
                <label>Quantité :</label>
                <input type="number" id="mvt-qte" placeholder="Ex: 10" min="0">
            </div>

            <button class="btn-block btn-gold" onclick="ajouterAuBordereau()">➕ AJOUTER AU BORDEREAU</button>
        </div>

        <div class="form-card">
            <h3 style="margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; color: var(--primary);">📋 Bordereau en cours</h3>
            <div class="table-responsive" style="margin-bottom: 15px;">
                <table>
                    <thead>
                        <tr>
                            <th>Mvt</th>
                            <th>Détail</th>
                            <th>Qté</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="table-bordereau">
                        <tr><td colspan="4" style="text-align: center; color: #95a5a6; font-size: 0.9rem;">Le bordereau est vide.</td></tr>
                    </tbody>
                </table>
            </div>
            <button id="btn-valider" class="btn-block btn-success" onclick="validerBordereau()" disabled>💾 ENREGISTRER DANS LA BASE</button>
        </div>
    </div>

    <!-- ONGLET 3 : ALERTES ET COMMANDES -->
    <div id="tab-commande" class="container">
        <div class="form-card">
            <h2 style="color: var(--danger); margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; font-size: 1.1rem;">🚨 Articles en Rupture ou Alerte</h2>
            
            <div id="liste-alertes" style="margin-top: 15px; margin-bottom: 20px;">
                <!-- Les alertes se mettront ici automatiquement -->
            </div>

            <!-- Le bouton magique pour envoyer sur WhatsApp peu importe le numéro -->
            <button id="btn-whatsapp" class="btn-block btn-success" onclick="envoyerWhatsApp()" style="display: none; background-color: #25D366; gap: 10px;">
                💬 TRANSMETTRE LA LISTE VIA WHATSAPP
            </button>
        </div>
    </div>

    <script>
                // --- SÉCURITÉ INSTITUTIONNELLE : LE GARDIEN DES PORTES ---
        (function verifierSecurite() {
            // 1. Vérification du badge
            const sessionActive = localStorage.getItem('sessionActive');
            const role = localStorage.getItem('roleUtilisateur');

            // Si le ticket est invalide ou que le rôle n'est pas le bon, on expulse.
            if (!sessionActive || (role !== 'magasinier' && role !== 'administrateur')) {
                localStorage.clear(); // Destruction des fausses données éventuelles
                window.location.href = 'index.html';
                return; // Bloque instantanément le reste du code
            }

            // 2. Le radar d'inactivité (30 minutes)
            let tempsInactivite;
            const TEMPS_LIMITE = 30 * 60 * 1000; // 30 minutes converties en millisecondes

            function deconnexionAutomatique() {
                localStorage.clear(); // Amnésie forcée
                window.location.href = 'index.html'; // Retour à l'accueil
            }

            function reinitialiserMinuteur() {
                clearTimeout(tempsInactivite);
                tempsInactivite = setTimeout(deconnexionAutomatique, TEMPS_LIMITE);
            }

            // On surveille le moindre mouvement sur l'écran ou le clavier
            window.onload = reinitialiserMinuteur;
            document.onmousemove = reinitialiserMinuteur;
            document.onkeypress = reinitialiserMinuteur;
            document.ontouchstart = reinitialiserMinuteur; // Tactile pour la tablette
        })();
        
        // LA PARTIE 2 VIENDRA SE COLLER JUSTE ICI EN DESSOUS !
                // --- 1. CONFIGURATION SUPABASE ---
           const SUPABASE_URL = "https://tkqosylavymaracevaxt.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrcW9zeWxhdnltYXJhY2V2YXh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTUyMTksImV4cCI6MjA5Nzk3MTIxOX0.hsF2SN7OrxIixwDgRznyYYlEtFzw7MKM2WIO7Aqsb0U";
        const clientSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // --- 2. VARIABLES GLOBALES (La mémoire du navigateur) ---
        let CATALOGUE = [];
        let STOCK_DEPOT = [];
        let bordereau = [];

        // Sécurité : On récupère le bordereau en cours si le magasinier a fermé l'écran par erreur
        try {
            bordereau = JSON.parse(localStorage.getItem('nina_depot_bordereau')) || [];
        } catch(e) {
            localStorage.removeItem('nina_depot_bordereau');
            bordereau = [];
        }

        // --- 3. DÉMARRAGE ET GESTION DES ONGLETS COULISSANTS ---
        window.onload = () => {
            chargerDonneesDepot();
            afficherBordereau();
        };

        function switchTab(tabId) {
            // 1. On cache tous les écrans
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            // 2. On enlève la couleur or de tous les boutons
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

            // 3. On affiche le bon écran
            document.getElementById('tab-' + tabId).classList.add('active');

            // 4. On met la couleur or sur l'onglet cliqué
            let btnActif = document.querySelector(`button[onclick="switchTab('${tabId}')"]`);
            if (btnActif) btnActif.classList.add('active');

            // 5. Si on revient sur la vision globale, on rafraîchit le stock pour être sûr
            if (tabId === 'vision') chargerDonneesDepot();
        }

        // --- 4. CHARGEMENT DES DONNÉES DEPUIS SUPABASE ---
        async function chargerDonneesDepot() {
            try {
                // A. On charge le catalogue (pour avoir le nom de tes articles)
                const { data: catData, error: catErr } = await clientSupabase
                    .from('articles_v2')
                    .select('*')
                    .order('nom_article');
                
                if (catErr) throw catErr;
                CATALOGUE = catData || [];

                // B. On charge le stock physique réel de la mercerie
                const { data: stockData, error: stockErr } = await clientSupabase
                    .from('stock_depot')
                    .select('*');
                
                if (stockErr) throw stockErr;
                STOCK_DEPOT = stockData || [];

                // C. On envoie ces données aux autres fonctions pour dessiner l'écran
                afficherVisionGlobale();
                remplirSelectArticles();
                construireAlertesCommande();
                
            } catch (err) {
                console.error("Erreur de chargement réseau :", err);
                document.getElementById('table-stock-body').innerHTML = `<tr><td colspan="4" style="color: var(--danger); text-align: center; font-weight: bold;">❌ Erreur réseau. Impossible de charger le stock.</td></tr>`;
            }
        }
            // --- 5. AFFICHAGE VISION GLOBALE (NOUVELLE VERSION TIROIRS) ---
        function afficherVisionGlobale() {
            // On cible tout le conteneur pour écraser l'ancien tableau plat
            const conteneur = document.querySelector('.table-responsive'); 
            let html = '';

            if (STOCK_DEPOT.length === 0) {
                conteneur.innerHTML = '<div style="text-align: center; padding: 20px; color: #7f8c8d;">Aucun article en stock</div>';
                return;
            }

            // 1. LE REGROUPEMENT INTELLIGENT (Catégorie -> Article -> Couleurs)
            let donneesGroupees = {};

            STOCK_DEPOT.forEach(ligne => {
                let infoArticle = CATALOGUE.find(a => a.id == ligne.article_id) || {};
                let nomArticle = infoArticle.nom_article || 'Article inconnu';
                // On récupère la colonne "famille" que j'ai vue sur ta capture !
                let famille = infoArticle.famille || 'SANS CATÉGORIE'; 

                // On crée les tiroirs s'ils n'existent pas encore
                if (!donneesGroupees[famille]) donneesGroupees[famille] = {};
                if (!donneesGroupees[famille][nomArticle]) donneesGroupees[famille][nomArticle] = [];

                // On range la ligne dans le bon tiroir
                donneesGroupees[famille][nomArticle].push(ligne);
            });

            // 2. DESSIN DE L'INTERFACE VISUELLE
            for (let famille in donneesGroupees) {
                html += `<div class="titre-famille">📦 CATÉGORIE : ${famille.toUpperCase()}</div>`;

                for (let article in donneesGroupees[famille]) {
                    let idUnique = 'art_' + Math.random().toString(36).substr(2, 9); 
                    
                    // En-tête cliquable de l'article (Accordéon)
                    html += `<div class="titre-article" onclick="document.getElementById('${idUnique}').classList.toggle('cache')">
                                <span>📁 ${article}</span>
                                <span>🔽</span>
                             </div>`;

                    // Liste des couleurs (cachée par défaut avec la classe 'cache')
                    html += `<div id="${idUnique}" class="contenu-couleurs cache">
                                <table style="width: 100%; border-collapse: collapse;">`;

                    donneesGroupees[famille][article].forEach(ligne => {
                        let qte = parseFloat(ligne.quantite);
                        let seuil = parseFloat(ligne.seuil_alerte) || 5;
                        let couleurTexte = (qte <= seuil) ? 'var(--danger)' : 'var(--text-dark)';
                        let nomCouleur = ligne.couleur_ref || 'Standard';

                        html += `<tr style="border-bottom: 1px dashed #ccc;" class="ligne-recherche">
                                    <td style="padding: 8px; width: 50%;">🎨 <b>${nomCouleur}</b></td>
                                    <td style="padding: 8px; width: 25%; color: ${couleurTexte}; font-weight: bold;">Qté: ${qte}</td>
                                    <td style="padding: 8px; width: 25%; text-align: right;">
                                        <!-- LE FAMEUX BOUTON DE CORRECTION -->
                                        <button onclick="corrigerStock('${ligne.id}', '${nomCouleur.replace(/'/g, "\\'")}', '${qte}')" style="background: var(--gold); border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; font-size: 12px;">✏️</button>
                                    </td>
                                 </tr>`;
                    });

                    html += `   </table>
                             </div>`;
                }
            }
            conteneur.innerHTML = html; // On injecte le nouveau design !
        }

        // --- NOUVEAUTÉ : LA FONCTION DE CORRECTION RAPIDE ---
        async function corrigerStock(idLigne, ancienneCouleur, ancienneQte) {
            let nouvelleCouleur = prompt(`CORRECTION\nNouveau nom pour la couleur "${ancienneCouleur}" :`, ancienneCouleur);
            if (nouvelleCouleur === null) return; // Si le magasinier annule
            
            let nouvelleQte = prompt(`Nouvelle quantité (actuellement ${ancienneQte}) :`, ancienneQte);
            if (nouvelleQte === null) return; // Si le magasinier annule
            nouvelleQte = parseFloat(nouvelleQte);

            if (isNaN(nouvelleQte) || nouvelleQte < 0) {
                return alert("❌ Quantité invalide !");
            }

            try {
                // On met à jour directement l'id précis dans Supabase
                const { error } = await clientSupabase
                    .from('stock_depot')
                    .update({ couleur_ref: nouvelleCouleur.trim(), quantite: nouvelleQte })
                    .eq('id', idLigne);

                if (error) throw error;
                
                alert("✅ Ligne corrigée avec succès !");
                chargerDonneesDepot(); // On rafraîchit l'écran pour voir la modification
                
            } catch (err) {
                alert("🚨 Erreur de correction : " + err.message);
            }
        }

        // --- MISE À JOUR DE LA BARRE DE RECHERCHE ---
        function filtrerStock() {
            let recherche = document.getElementById('search-stock').value.toLowerCase();
            let lignes = document.querySelectorAll('.ligne-recherche'); 

            lignes.forEach(ligne => {
                let texte = ligne.innerText.toLowerCase();
                ligne.style.display = texte.includes(recherche) ? '' : 'none';
                
                // Petit bonus : si on trouve une couleur en cherchant, on ouvre son tiroir automatiquement !
                if (texte.includes(recherche) && recherche !== "") {
                    ligne.closest('.contenu-couleurs').classList.remove('cache');
                }
            });
        }

        // --- 6. GESTION DES MOUVEMENTS ET DU BORDEREAU ---
        function remplirSelectArticles() {
            const select = document.getElementById('mvt-article');
            select.innerHTML = '<option value="">-- Sélectionnez un article --</option>';
            CATALOGUE.forEach(art => {
                select.innerHTML += `<option value="${art.id}">${art.nom_article}</option>`;
            });
        }

        function toggleDestination() {
            const type = document.getElementById('mvt-type').value;
            const destDiv = document.getElementById('group-destination');
            // On affiche le choix de la destination UNIQUEMENT si c'est une sortie
            destDiv.style.display = (type === 'SORTIE') ? 'block' : 'none';
        }

        function ajouterAuBordereau() {
            const typeMvt = document.getElementById('mvt-type').value;
            const destination = typeMvt === 'SORTIE' ? document.getElementById('mvt-destination').value : 'Dépôt Principal';
            
            const selectArt = document.getElementById('mvt-article');
            const idArticle = selectArt.value;
            if (!idArticle) return alert("⚠️ Veuillez sélectionner un article.");
            const nomArticle = selectArt.options[selectArt.selectedIndex].text;

            const couleur = document.getElementById('mvt-couleur').value.trim() || 'Standard';
            const qte = parseFloat(document.getElementById('mvt-qte').value);

            if (isNaN(qte) || qte <= 0) return alert("⚠️ Veuillez saisir une quantité valide !");

            // LE FAMEUX SEUIL HYBRIDE : On vérifie si la couleur existe déjà dans le stock
            let articleExistant = STOCK_DEPOT.find(s => s.article_id == idArticle && s.couleur_ref.toLowerCase() === couleur.toLowerCase());
            
            let seuilChoisi = 5; // Valeur par défaut
            if (!articleExistant) {
                if (typeMvt === 'SORTIE') {
                    // Sécurité anti-erreur
                    return alert("❌ Impossible ! Vous essayez de faire sortir une couleur (" + couleur + ") qui n'existe pas en stock.");
                } else {
                    // C'est une ENTRÉE d'une nouvelle couleur, on fait bosser le magasinier !
                    let rep = prompt(`✨ Nouvelle couleur détectée : ${couleur} !\n\nÀ partir de combien d'unités restantes l'application doit-elle vous alerter de la rupture pour cette couleur précise ?\n\n(Laissez le chiffre par défaut ou modifiez-le) :`, "5");
                    if (rep === null) return; // Le magasinier a cliqué sur Annuler
                    seuilChoisi = parseFloat(rep) || 5;
                }
            }

            bordereau.push({
                article_id: idArticle,
                nom_article: nomArticle,
                type_mouvement: typeMvt,
                destination: destination,
                couleur: couleur,
                qte: qte,
                seuil: seuilChoisi
            });

            localStorage.setItem('nina_depot_bordereau', JSON.stringify(bordereau));
            
            // Vider les champs pour aller plus vite au prochain article
            document.getElementById('mvt-couleur').value = '';
            document.getElementById('mvt-qte').value = '';
            
            afficherBordereau();
        }

        function afficherBordereau() {
            const tbody = document.getElementById('table-bordereau');
            tbody.innerHTML = '';
            const btnValider = document.getElementById('btn-valider');

            if (bordereau.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #95a5a6; font-size: 0.9rem;">Le bordereau est vide.</td></tr>';
                btnValider.disabled = true;
                return;
            }

            btnValider.disabled = false;

            bordereau.forEach((item, index) => {
                let icone = item.type_mouvement === 'ENTREE' ? '📥' : '📤';
                let couleurLigne = item.type_mouvement === 'ENTREE' ? 'var(--success)' : 'var(--danger)';
                
                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color: ${couleurLigne}; font-weight: bold; font-size: 12px;">${icone} ${item.type_mouvement}</td>
                    <td><strong style="font-size: 13px;">${item.nom_article}</strong><br><span style="font-size:11px; color:#7f8c8d;">${item.couleur}</span></td>
                    <td style="font-weight: bold;">${item.qte}</td>
                    <td><button class="btn-block btn-danger" style="margin-top:0;" onclick="supprimerDuBordereau(${index})">❌</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function supprimerDuBordereau(index) {
            bordereau.splice(index, 1);
            localStorage.setItem('nina_depot_bordereau', JSON.stringify(bordereau));
            afficherBordereau();
        }

        // --- 7. VALIDATION ET ENVOI À SUPABASE (Le moteur mathématique sécurisé) ---
        async function validerBordereau() {
            if (bordereau.length === 0) return;

            const btn = document.getElementById('btn-valider');
            btn.disabled = true;
            btn.innerText = "⏳ Enregistrement en cours...";

            try {
                for (let item of bordereau) {
        // 1. Historique (La trace pour l'administrateur)
        const { error: erreurHistorique } = await clientSupabase.from('mouvements_stock').insert([{
            // On utilise UNIQUEMENT les nouvelles colonnes créées par le magasinier
            article_id: item.article_id,     
            nom_article: item.nom_article,         
            quantite: item.qte,                   
            couleur: item.couleur,
            type_mouvement: item.type_mouvement,
            destination: item.destination,
            utilisateur: 'Magasinier'
        }]);

        // LE DÉTECTEUR INFAILLIBLE : 
        if (erreurHistorique) {
            alert("🚨 REFUS DE SUPABASE : " + erreurHistorique.message);
            btn.disabled = false;
            btn.innerText = "💾 ENREGISTRER DANS LA BASE";
            return; 
        }            
                    
                    // 2. Mise à jour du stock physique
                    const { data: existData } = await clientSupabase.from('stock_depot')
                        .select('id, quantite')
                        .eq('article_id', item.article_id)
                        .eq('couleur_ref', item.couleur);

                    if (existData && existData.length > 0) {
                        // LA LIGNE EXISTE : Voici ton système d'addition et de soustraction !
                        let qteActuelle = parseFloat(existData[0].quantite);
                        let nouvelleQte = item.type_mouvement === 'ENTREE' 
                                          ? qteActuelle + item.qte 
                                          : qteActuelle - item.qte;
                        
                        await clientSupabase.from('stock_depot')
                            .update({ quantite: nouvelleQte })
                            .eq('id', existData[0].id);
                    } else {
                        // LA LIGNE N'EXISTE PAS : On la crée avec le seuil choisi par le magasinier
                        await clientSupabase.from('stock_depot').insert([{
                            article_id: item.article_id,
                            couleur_ref: item.couleur,
                            quantite: item.qte,
                            seuil_alerte: item.seuil
                        }]);
                    }
                }

                alert("✅ Le bordereau a été enregistré avec succès !");
                bordereau = []; 
                localStorage.removeItem('nina_depot_bordereau');
                afficherBordereau();
                chargerDonneesDepot(); // On rafraîchit l'onglet 1 instantanément
                btn.innerText = "💾 ENREGISTRER DANS LA BASE";

            } catch (err) {
                console.error(err);
                alert("❌ Erreur de réseau. Vérifiez la connexion.");
                btn.disabled = false;
                btn.innerText = "🔄 RÉESSAYER";
            }
        }

        // --- 8. ALERTES ET GÉNÉRATEUR WHATSAPP ---
        function construireAlertesCommande() {
            const conteneur = document.getElementById('liste-alertes');
            const btnWhatsApp = document.getElementById('btn-whatsapp');
            conteneur.innerHTML = '';

            // On filtre : on ne garde que ce qui est en dessous du seuil
            let enAlerte = STOCK_DEPOT.filter(art => parseFloat(art.quantite) <= parseFloat(art.seuil_alerte));

            if (enAlerte.length === 0) {
                conteneur.innerHTML = '<div style="color: var(--success); text-align: center; font-weight: bold; padding: 20px;">✅ Tout va bien, aucun article n\'est en rupture.</div>';
                btnWhatsApp.style.display = 'none';
                return;
            }

            btnWhatsApp.style.display = 'flex'; // On affiche le bouton vert WhatsApp

            enAlerte.forEach(ligne => {
                let infoArticle = CATALOGUE.find(a => a.id == ligne.article_id) || {};
                let nom = infoArticle.nom_article || 'Article inconnu';
                
                conteneur.innerHTML += `
                    <div class="alerte-card">
                        <div>
                            <strong style="color: var(--primary);">${nom}</strong><br>
                            <span style="font-size: 13px; color: #7f8c8d;">Couleur: ${ligne.couleur_ref}</span>
                        </div>
                        <div style="text-align: right;">
                            <strong style="color: var(--danger); font-size: 1.1rem;">Reste : ${ligne.quantite}</strong><br>
                            <span style="font-size: 11px; color: var(--gold); font-weight: bold;">(Seuil: ${ligne.seuil_alerte})</span>
                        </div>
                    </div>
                `;
            });
        }

        function envoyerWhatsApp() {
            let enAlerte = STOCK_DEPOT.filter(art => parseFloat(art.quantite) <= parseFloat(art.seuil_alerte));
            if (enAlerte.length === 0) return;

            // Construction du texte clair et propre
            let texte = "🚨 *ALERTE RUPTURE - DÉPÔT NINA FASHION* 🚨\n\nBonjour, voici les articles à recommander urgemment :\n\n";

            enAlerte.forEach(ligne => {
                let infoArticle = CATALOGUE.find(a => a.id == ligne.article_id) || {};
                let nom = infoArticle.nom_article || 'Article inconnu';
                texte += `🔸 *${nom}* (${ligne.couleur_ref})\n`;
                texte += `👉 Reste : ${ligne.quantite} (Seuil paramétré : ${ligne.seuil_alerte})\n\n`;
            });

            texte += "_Message envoyé depuis l'application logistique du dépôt._";

            // L'URL universelle de WhatsApp (Le magasinier choisira lui-même à qui l'envoyer)
            const url = "https://wa.me/?text=" + encodeURIComponent(texte);
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
