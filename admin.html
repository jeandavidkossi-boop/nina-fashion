<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration — Nina Fashion</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Outil pour lire les fichiers CSV facilement -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #1a1c1e;
            --gold: #b38728;
            --bg-gray: #f4f6f8;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { background-color: var(--bg-gray); padding-bottom: 50px; }

        header { 
            background: var(--primary); color: white; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        header h1 { font-size: 20px; color: var(--gold); }
        .btn-retour { background: transparent; border: 1px solid var(--gold); color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer; text-decoration: none; }

        .container { max-width: 800px; margin: 30px auto; padding: 0 15px; }

        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .card h2 { font-size: 18px; color: var(--primary); margin-bottom: 15px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; display: inline-block; }

        .import-zone { border: 2px dashed #bdc3c7; border-radius: 8px; padding: 40px 20px; text-align: center; background: #fafafa; }
        .import-zone input { display: none; }
        .import-btn { background: var(--gold); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; margin-top: 15px; }
        .import-btn:hover { background: #967120; }

        #status-message { margin-top: 20px; font-weight: bold; padding: 15px; border-radius: 8px; display: none; }
        .status-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .status-loading { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

    <header>
        <h1>Tableau de Bord — Gérant</h1>
        <a href="index.html" class="btn-retour">Déconnexion</a>
    </header>

    <div class="container">
        
        <div class="card">
            <h2>📥 Importer le Catalogue</h2>
            <p style="color: #7f8c8d; font-size: 14px; margin-bottom: 20px;">
                Importez votre fichier CSV contenant tous les articles du magasin. L'opération mettra à jour les prix et ajoutera les nouveaux articles automatiquement.
            </p>

            <div class="import-zone">
                <p>Sélectionnez le fichier <strong>catalogue_nina_fashion.csv</strong> sur votre téléphone</p>
                <input type="file" id="csv-file" accept=".csv" onchange="fichierSelectionne()" />
                <button class="import-btn" onclick="document.getElementById('csv-file').click()">Choisir le fichier CSV</button>
                <br>
                <button id="btn-valider-import" class="import-btn" style="background: var(--primary); display: none; margin-top: 20px;" onclick="importerDansSupabase()">🚀 Lancer l'injection dans la base</button>
            </div>

            <div id="status-message"></div>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://tkqosylavymaracevaxt.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrcW9zeWxhdnltYXJhY2V2YXh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTUyMTksImV4cCI6MjA5Nzk3MTIxOX0.hsF2SN7OrxIixwDgRznyYYlEtFzw7MKM2WIO7Aqsb0U";
        const clientSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function afficherStatut(message, type) {
            const div = document.getElementById('status-message');
            div.innerText = message;
            div.className = ''; 
            div.classList.add('status-' + type);
            div.style.display = 'block';
        }

        function fichierSelectionne() {
            const file = document.getElementById('csv-file').files[0];
            if(file) {
                afficherStatut("Fichier sélectionné : " + file.name + ". Cliquez sur Lancer l'injection.", "success");
                document.getElementById('btn-valider-import').style.display = 'inline-block';
            }
        }

        function importerDansSupabase() {
            const file = document.getElementById('csv-file').files[0];
            if(!file) return alert("Veuillez d'abord sélectionner un fichier.");

            afficherStatut("⏳ Lecture du fichier et envoi vers la base de données... Patientez...", "loading");

            // PapaParse lit le fichier CSV directement depuis le téléphone
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: async function(results) {
                    const data = results.data;
                    
                    // On prépare les données au format attendu par Supabase
                    const articlesToInsert = data.map(row => ({
                        ref: row.ref,
                        designation: row.designation,
                        categorie: row.categorie,
                        prix_detail: parseInt(row.prix_detail) || 0,
                        prix_paquet: parseInt(row.prix_paquet) || 0,
                        prix_achat: parseInt(row.prix_achat) || 0,
                        stock_actuel: parseInt(row.stock_actuel) || 0,
                        stock_minimum: parseInt(row.stock_minimum) || 0,
                        notes: row.notes || ''
                    })).filter(art => art.ref && art.designation); // On ignore les lignes vides

                    // Envoi à Supabase
                    const { error } = await clientSupabase.from('articles').upsert(articlesToInsert, { onConflict: 'ref' });

                    if(error) {
                        afficherStatut("❌ Erreur lors de l'envoi : " + error.message, "error");
                        console.error(error);
                    } else {
                        afficherStatut("✅ Merveilleux ! " + articlesToInsert.length + " articles ont été enregistrés avec succès dans la base de Nina Fashion.", "success");
                    }
                }
            });
        }
    </script>
</body>
</html>
